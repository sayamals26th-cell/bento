<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注文一覧</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
:root {
  --navy: #1b2a4a; --gold: #d4900a; --gold-lt: #f5c040;
  --cream: #faf7f2; --white: #fff; --border: #dde4ee;
  --gray: #8899aa; --green: #1e8a50; --text: #1e2a3a;
  --shadow: 0 2px 12px rgba(27,42,74,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; padding-bottom: 48px; }

.header { background: var(--navy); color: #fff; padding: 18px 18px 14px; position: relative; overflow: hidden; }
.header::after { content: '📋'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 48px; opacity: 0.12; }
.header-badge { display: inline-block; background: var(--gold); color: var(--navy); font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 20px; letter-spacing: 0.08em; margin-bottom: 8px; }
.header h1 { font-size: 20px; font-weight: 900; }
.event-box { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; margin-top: 10px; display: none; }
.event-date { font-size: 16px; font-weight: 700; color: var(--gold-lt); }
.event-meta { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
.header-order-link { display: none; text-align: center; background: var(--gold); color: var(--navy); font-size: 12px; font-weight: 700; padding: 8px; margin-top: 10px; border-radius: 6px; text-decoration: none; }

/* 集計サマリー */
.summary-section { padding: 16px 16px 8px; }
.summary-cards { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
.summary-cards::-webkit-scrollbar { display: none; }
.summary-card { flex: 0 0 auto; background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 100px; box-shadow: var(--shadow); text-align: center; }
.summary-card-label { font-size: 11px; font-weight: 700; color: var(--gray); letter-spacing: 0.08em; margin-bottom: 4px; }
.summary-card-val { font-size: 24px; font-weight: 900; color: var(--navy); }
.summary-card-val span { font-size: 12px; font-weight: 500; }

/* 各家庭の注文カード */
.orders-section { padding: 8px 16px; }
.section-title { font-size: 11px; font-weight: 700; color: var(--gray); letter-spacing: 0.12em; margin-bottom: 10px; margin-top: 10px; }
.order-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
.order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.order-name { font-size: 16px; font-weight: 700; color: var(--navy); }
.order-total-badge { background: var(--navy); color: var(--gold-lt); font-size: 14px; font-weight: 900; padding: 4px 12px; border-radius: 20px; }
.order-rows { display: flex; flex-direction: column; gap: 5px; }
.order-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.order-row-label { color: var(--gray); font-weight: 500; }
.order-row-val { font-weight: 700; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.badge-normal { background: #e8f0ff; color: var(--navy); }
.badge-large  { background: #fff3cc; color: #a06000; }
.badge-none   { background: #f0f4f8; color: #aaa; }
.order-extra { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); font-size: 12px; color: var(--gray); }
.order-extra strong { color: var(--text); }
.order-time { font-size: 10px; color: #ccc; margin-top: 6px; text-align: right; }

.empty-msg { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 14px; }

.footer { margin-top: 24px; padding: 16px; border-top: 1px solid var(--border); text-align: center; }
.footer-order-link { display: inline-block; color: var(--white); background: var(--navy); font-size: 13px; font-weight: 700; text-decoration: none; padding: 12px 28px; border-radius: 8px; }

.loading { text-align: center; padding: 60px 20px; color: var(--gray); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 8px; padding: 16px; margin: 20px 16px; color: #c0392b; font-size: 14px; text-align: center; }
</style>
</head>
<body>

<div class="header">
  <span class="header-badge">📋 注文一覧</span>
  <h1 id="header-title">読み込み中…</h1>
  <div class="event-box" id="event-box">
    <div class="event-date" id="event-date"></div>
    <div class="event-meta" id="event-vendor"></div>
  </div>
  <div id="header-order-link" style="display:none;text-align:center;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:12px;padding:8px;margin-top:10px;border-radius:6px;">注文内容の変更・修正は長谷川に連絡してください</div>
</div>

<div id="main-content">
  <div class="loading"><div class="spinner"></div>読み込み中…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ★ Firebase設定（common.jsと同じ値）
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB12L3oAwAzfb252QW1DlQBHg1XFSBFOpA",
  authDomain: "baseball-luch.firebaseapp.com",
  databaseURL: "https://baseball-luch-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "baseball-luch",
  storageBucket: "baseball-luch.firebasestorage.app",
  messagingSenderId: "1043312857891",
  appId: "1:1043312857891:web:e4bf231fc8b14808d77296"
};
function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const week = ["日","月","火","水","木","金","土"];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${week[d.getDay()]}）`;
}
function sizeLabel(size) { return { normal:"並", large:"大盛", none:"不要" }[size] || size; }
function getLastEventId() { return localStorage.getItem("bento_last_event"); }

const app = initializeApp(FIREBASE_CONFIG);
const db = getDatabase(app);

const params = new URLSearchParams(location.search);
const eventId = params.get("e") || getLastEventId();

async function init() {
  if (!eventId) { showError("URLが正しくありません。"); return; }

  const orderUrl = `index.html?e=${eventId}`;
  const hol = document.getElementById("header-order-link");
  hol.style.display = "block";

  // リアルタイム監視
  onValue(ref(db, `events/${eventId}`), snap => {
    if (!snap.exists()) { showError("イベントが見つかりません。"); return; }
    render(snap.val(), eventId);
  }, err => {
    showError("データの読み込みに失敗しました。");
  });
}

function render(ev, eid) {
  document.getElementById("header-title").textContent = ev.title || "注文一覧";
  if (ev.date) {
    document.getElementById("event-date").textContent = formatDate(ev.date);
    document.getElementById("event-vendor").textContent = `発注先：${ev.vendor || "未設定"}`;
    document.getElementById("event-box").style.display = "block";
  }

  const menu = ev.menu || {};
  const orders = ev.orders ? Object.entries(ev.orders) : [];
  orders.sort((a,b) => (a[1].createdAt||0) - (b[1].createdAt||0));

  const orderUrl = `index.html?e=${eid}`;

  // 集計
  let countNormal = 0, countLarge = 0, totalYen = 0;
  orders.forEach(([,o]) => {
    ["player","father","mother"].forEach(m => {
      if (o[m] === "normal") countNormal++;
      if (o[m] === "large")  countLarge++;
    });
    totalYen += Number(o.total || 0);
  });

  const summaryHTML = orders.length > 0 ? `
    <div class="summary-section">
      <div class="section-title">SUMMARY</div>
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-card-label">回答数</div>
          <div class="summary-card-val">${orders.length}<span>家庭</span></div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">並</div>
          <div class="summary-card-val">${countNormal}<span>個</span></div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">大盛</div>
          <div class="summary-card-val">${countLarge}<span>個</span></div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">合計金額</div>
          <div class="summary-card-val" style="font-size:18px">${totalYen.toLocaleString()}<span>円</span></div>
        </div>
      </div>
    </div>` : "";

  const ordersHTML = orders.length === 0
    ? `<div class="empty-msg">まだ注文はありません</div>`
    : orders.map(([id, o]) => {
        const members = [
          {key:"player", label:"選手"},
          {key:"father", label:"父"},
          {key:"mother", label:"母"},
        ];
        const rowsHTML = members.map(m => {
          const size = o[m.key] || "none";
          const cls = size === "normal" ? "badge-normal" : size === "large" ? "badge-large" : "badge-none";
          const price = size !== "none" && menu[size] ? `　${Number(menu[size]).toLocaleString()}円` : "";
          return `<div class="order-row">
            <span class="order-row-label">${m.label}</span>
            <span><span class="badge ${cls}">${sizeLabel(size)}</span>${price}</span>
          </div>`;
        }).join("");
        const extraHTML = o.extraNote
          ? `<div class="order-extra"><strong>その他：</strong>${escHtml(o.extraNote)}</div>` : "";
        const timeStr = o.createdAt
          ? new Date(o.createdAt).toLocaleTimeString("ja-JP", {hour:"2-digit",minute:"2-digit"}) : "";
        return `<div class="order-card">
          <div class="order-card-header">
            <span class="order-name">${escHtml(o.playerName)}</span>
            <span class="order-total-badge">${Number(o.total||0).toLocaleString()}円</span>
          </div>
          <div class="order-rows">${rowsHTML}</div>
          ${extraHTML}
          ${timeStr ? `<div class="order-time">送信 ${timeStr}</div>` : ""}
        </div>`;
      }).join("");

  document.getElementById("main-content").innerHTML = `
    ${summaryHTML}
    <div class="orders-section">
      <div class="section-title">ORDERS（${orders.length}件）</div>
      ${ordersHTML}
    </div>
    <div class="footer">
      <p style="font-size:13px;color:var(--gray);text-align:center;padding:8px 0;">注文内容の変更・修正は長谷川に連絡してください</p>
    </div>
  `;
}

function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function showError(msg) {
  document.getElementById("main-content").innerHTML = `<div class="error-box">⚠️ ${msg}</div>`;
}

init();
</script>
</body>
</html>
